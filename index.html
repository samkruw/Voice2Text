<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice2Text · ZeroGen Style</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <!-- Google Fonts: Inter (wie ZeroGen) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: #f8fafc;  /* Heller Hintergrund wie bei ZeroGen */
            color: #1e293b; 
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: #ffffff; 
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            padding: 20px;
            border-radius: 30px 30px 0 0;
        }
        /* Header ohne Logo – nur App-Name */
        .app-header {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        .app-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1e3a8a;
            letter-spacing: -0.02em;
            margin: 0;
        }
        .app-header p {
            color: #64748b;
            margin-top: 5px;
            font-size: 0.95rem;
        }
        h2 { 
            color: #1e3a8a; 
            margin-bottom: 20px; 
            font-weight: 600; 
            font-size: 1.5rem; 
        }
        input, button, textarea { 
            width: 100%; 
            padding: 16px; 
            margin: 6px 0 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 40px; 
            font-size: 16px;
            font-family: inherit;
            background: #f8fafc;
            transition: all 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }
        button { 
            background: #1e3a8a; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: 600;
            border-radius: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        button:active { transform: scale(0.97); background: #1e3a8a; }
        button:disabled { background: #94a3b8; box-shadow: none; transform: none; }
        .error { color: #dc2626; margin: 10px 0; font-size: 14px; }
        .nav { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 25px; 
            flex-wrap: wrap;
        }
        .nav button { 
            width: auto; 
            background: #ffffff; 
            color: #1e3a8a; 
            border: 1px solid #1e3a8a;
            flex: 1 1 auto;
            box-shadow: none;
            font-weight: 500;
        }
        .nav button:active { background: #e0f2fe; }
        .card { 
            background: #ffffff; 
            padding: 18px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            cursor: pointer;
            border-left: 6px solid #1e3a8a;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .card:active { transform: scale(0.99); }
        .hidden { display: none; }
        #transcriptBox { 
            background: #f8fafc; 
            padding: 18px; 
            border-radius: 20px; 
            min-height: 180px; 
            margin: 20px 0; 
            white-space: pre-wrap; 
            word-wrap: break-word;
            font-size: 16px;
            border: 1px solid #e2e8f0;
        }
        #interim { color: #64748b; font-style: italic; margin-top: 10px; }
        #final { color: #1e293b; }
        #detailContent { 
            background: #f8fafc; 
            padding: 18px; 
            border-radius: 20px; 
            margin: 15px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid #e2e8f0;
        }
        .download-btn {
            background: #10b981;  /* Frisches Grün als Akzent */
            margin-top: 20px;
            border: none;
            color: white;
            font-weight: 600;
        }
        .download-btn:active { background: #059669; }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .flex-row button {
            margin-top: 0;
        }
        /* Spezielle Anpassungen für kleine Geräte */
        @media (max-width: 400px) {
            .container { padding: 16px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Der Header erscheint in jeder eingeloggten Ansicht, aber nicht auf Login/Register? Wir platzieren ihn dynamisch via JS? 
             Einfacher: Wir fügen ihn in jede View separat ein. -->
        
        <!-- Login View -->
        <div id="loginView" class="view">
            <div class="app-header">
                <h1>Voice2Text</h1>
                <p>Intelligente Transkription für Schweizer KMU</p>
            </div>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="E-Mail" required>
                <input type="password" id="loginPassword" placeholder="Passwort" required>
                <button type="submit">Anmelden</button>
                <button type="button" id="showRegisterBtn" style="background:#ffffff; color:#1e3a8a; border:1px solid #1e3a8a;">Registrieren</button>
            </form>
            <div id="loginError" class="error"></div>
        </div>

        <!-- Register View -->
        <div id="registerView" class="view hidden">
            <div class="app-header">
                <h1>Voice2Text</h1>
                <p>Neu bei ZeroGen? Konto erstellen</p>
            </div>
            <form id="registerForm">
                <input type="text" id="registerName" placeholder="Name (optional)">
                <input type="email" id="registerEmail" placeholder="E-Mail" required>
                <input type="password" id="registerPassword" placeholder="Passwort" required>
                <button type="submit">Registrieren</button>
                <button type="button" id="showLoginBtn" style="background:#ffffff; color:#1e3a8a; border:1px solid #1e3a8a;">← Zurück zum Login</button>
            </form>
            <div id="registerError" class="error"></div>
        </div>

        <!-- Dashboard View (nach Login) -->
        <div id="dashboardView" class="view hidden">
            <div class="app-header">
                <h1>Voice2Text</h1>
                <p>Meine Aufnahmen</p>
            </div>
            <div class="nav">
                <button id="newRecordingBtn">➕ Neue Aufnahme</button>
                <button id="logoutBtn">🚪 Abmelden</button>
            </div>
            <div id="recordingsList"></div>
        </div>

        <!-- Record View (Live-Transkription) -->
        <div id="recordView" class="view hidden">
            <div class="app-header">
                <h1>Voice2Text</h1>
                <p>Neue Transkription starten</p>
            </div>
            <div class="nav">
                <button id="backToDashboardBtn">← Zurück</button>
            </div>
            <p style="margin-bottom: 10px;">Sprache: Deutsch</p>
            <div class="flex-row">
                <button id="startRecordingBtn" style="flex:2;">🎤 Start</button>
                <button id="stopRecordingBtn" style="flex:1;" disabled>⏹️ Stop</button>
            </div>
            <div id="transcriptBox">
                <div id="final"></div>
                <div id="interim"></div>
            </div>
            <form id="saveTranscriptForm" class="hidden">
                <h3>Transkription speichern</h3>
                <textarea id="transcriptText" rows="6" readonly style="background:#f8fafc;"></textarea>
                <button type="submit">💾 In Meine Aufnahmen speichern</button>
            </form>
        </div>

        <!-- Detail View (mit Download) -->
        <div id="detailView" class="view hidden">
            <div class="app-header">
                <h1>Voice2Text</h1>
                <p>Details zur Aufnahme</p>
            </div>
            <div class="nav">
                <button id="backFromDetailBtn">← Zurück</button>
            </div>
            <div id="detailContent"></div>
            <button id="downloadTranscriptBtn" class="download-btn">📥 Als Text herunterladen</button>
        </div>
    </div>

    <script>
        // --------------------------------------
        // 1. FIREBASE KONFIGURATION – BITTE ERSETZEN!
        // --------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyBwVWZ-pvmxpblIjejl9gjNLe0yFq4pN5s",
            authDomain: "voice2textzerogen.firebaseapp.com",
            projectId: "voice2textzerogen",
            storageBucket: "voice2textzerogen.firebasestorage.app",
            messagingSenderId: "228011105975",
            appId: "1:228011105975:web:43912cc1c0b24897c1b732"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        // Firestore offline Persistenz aktivieren (für median.co wichtig)
        db.enablePersistence().catch(err => console.warn('Offline-Modus nicht aktiviert', err));

        // --------------------------------------
        // 2. GLOBALE VARIABLEN
        // --------------------------------------
        let currentUser = null;
        let recognition = null;
        let finalTranscript = '';
        let currentDetailTranscript = ''; // Für Download
        let currentDetailDate = '';       // Für Dateinamen

        // --------------------------------------
        // 3. VIEW-MANAGEMENT (Hash-Routing)
        // --------------------------------------
        const views = {
            login: document.getElementById('loginView'),
            register: document.getElementById('registerView'),
            dashboard: document.getElementById('dashboardView'),
            record: document.getElementById('recordView'),
            detail: document.getElementById('detailView')
        };

        function showView(viewName, param = null) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            if (views[viewName]) {
                views[viewName].classList.remove('hidden');
                if (viewName === 'detail' && param) {
                    loadRecordingDetail(param);
                } else if (viewName === 'dashboard') {
                    loadRecordings();
                }
            }
            // Hash aktualisieren
            if (viewName === 'detail' && param) {
                location.hash = `#detail/${param}`;
            } else if (viewName !== 'detail') {
                location.hash = `#${viewName}`;
            }
        }

        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', handleRoute);

        function handleRoute() {
            const hash = location.hash.slice(1) || 'login';
            const parts = hash.split('/');
            const view = parts[0];
            if (currentUser) {
                if (view === 'login' || view === 'register') {
                    showView('dashboard');
                } else if (view === 'detail' && parts[1]) {
                    showView('detail', parts[1]);
                } else if (view === 'record') {
                    showView('record');
                } else {
                    showView('dashboard');
                }
            } else {
                if (view === 'register') {
                    showView('register');
                } else {
                    showView('login');
                }
            }
        }

        // --------------------------------------
        // 4. AUTHENTIFIZIERUNG
        // --------------------------------------
        auth.onAuthStateChanged(user => {
            currentUser = user;
            handleRoute();
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                document.getElementById('loginError').innerText = error.message;
            }
        });

        document.getElementById('showRegisterBtn').addEventListener('click', () => {
            showView('register');
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const name = document.getElementById('registerName').value;
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                if (name) {
                    await userCred.user.updateProfile({ displayName: name });
                }
            } catch (error) {
                document.getElementById('registerError').innerText = error.message;
            }
        });

        document.getElementById('showLoginBtn').addEventListener('click', () => {
            showView('login');
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await auth.signOut();
            showView('login');
        });

        // Zurück-Buttons
        document.getElementById('backToDashboardBtn').addEventListener('click', () => showView('dashboard'));
        document.getElementById('backFromDetailBtn').addEventListener('click', () => showView('dashboard'));

        // --------------------------------------
        // 5. DASHBOARD: AUFNAHMEN LISTEN
        // --------------------------------------
        async function loadRecordings() {
            if (!currentUser) return;
            const snapshot = await db.collection('recordings')
                .where('userId', '==', currentUser.uid)
                .orderBy('createdAt', 'desc')
                .get();
            const list = document.getElementById('recordingsList');
            list.innerHTML = '';
            if (snapshot.empty) {
                list.innerHTML = '<p style="text-align:center;color:#64748b;">Keine Aufnahmen vorhanden. Tippe auf "Neue Aufnahme"!</p>';
                return;
            }
            snapshot.forEach(doc => {
                const data = doc.data();
                const date = data.createdAt?.toDate().toLocaleString() || 'Unbekannt';
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<strong>${date}</strong><br>${data.transcript?.substring(0, 80)}…`;
                card.addEventListener('click', () => showView('detail', doc.id));
                list.appendChild(card);
            });
        }

        document.getElementById('newRecordingBtn').addEventListener('click', () => {
            showView('record');
            finalTranscript = '';
            document.getElementById('final').innerHTML = '';
            document.getElementById('interim').innerHTML = '';
            document.getElementById('saveTranscriptForm').classList.add('hidden');
            document.getElementById('startRecordingBtn').disabled = false;
            document.getElementById('stopRecordingBtn').disabled = true;
        });

        // --------------------------------------
        // 6. LIVE-TRANSKRIPTION (Web Speech API)
        // --------------------------------------
        if (!('webkitSpeechRecognition' in window)) {
            alert('Ihr Browser unterstützt keine Spracherkennung. Bitte verwenden Sie Chrome oder Edge auf Android.');
        } else {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';

            recognition.onstart = () => {
                document.getElementById('startRecordingBtn').disabled = true;
                document.getElementById('stopRecordingBtn').disabled = false;
                document.getElementById('saveTranscriptForm').classList.add('hidden');
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                alert('Fehler bei der Spracherkennung: ' + event.error);
                document.getElementById('startRecordingBtn').disabled = false;
                document.getElementById('stopRecordingBtn').disabled = true;
            };

            recognition.onend = () => {
                document.getElementById('startRecordingBtn').disabled = false;
                document.getElementById('stopRecordingBtn').disabled = true;
                if (finalTranscript.trim() !== '') {
                    document.getElementById('transcriptText').value = finalTranscript;
                    document.getElementById('saveTranscriptForm').classList.remove('hidden');
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                document.getElementById('final').innerHTML = `<strong>Endgültig:</strong> ${finalTranscript}`;
                document.getElementById('interim').innerHTML = `<strong>Vorläufig:</strong> ${interimTranscript}`;
            };
        }

        document.getElementById('startRecordingBtn').addEventListener('click', () => {
            if (recognition) {
                finalTranscript = '';
                document.getElementById('final').innerHTML = '';
                document.getElementById('interim').innerHTML = '';
                recognition.start();
            }
        });

        document.getElementById('stopRecordingBtn').addEventListener('click', () => {
            if (recognition) {
                recognition.stop();
            }
        });

        // Transkription speichern
        document.getElementById('saveTranscriptForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const transcript = document.getElementById('transcriptText').value;
            try {
                await db.collection('recordings').add({
                    userId: currentUser.uid,
                    transcript: transcript,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'completed'
                });
                alert('Transkription gespeichert!');
                showView('dashboard');
            } catch (err) {
                alert('Fehler beim Speichern: ' + err.message);
            }
        });

        // --------------------------------------
        // 7. DETAILANSICHT & DOWNLOAD
        // --------------------------------------
        async function loadRecordingDetail(recordingId) {
            if (!currentUser) return;
            const doc = await db.collection('recordings').doc(recordingId).get();
            if (!doc.exists) {
                document.getElementById('detailContent').innerHTML = '<p>Aufnahme nicht gefunden.</p>';
                return;
            }
            const data = doc.data();
            if (data.userId !== currentUser.uid) {
                document.getElementById('detailContent').innerHTML = '<p>Zugriff verweigert.</p>';
                return;
            }
            const date = data.createdAt?.toDate().toLocaleString() || 'Unbekannt';
            currentDetailTranscript = data.transcript || '';
            currentDetailDate = data.createdAt?.toDate() || new Date();

            document.getElementById('detailContent').innerHTML = `
                <p><strong>Datum:</strong> ${date}</p>
                <p><strong>Transkription:</strong></p>
                <div style="background:#fff; padding:15px; border-radius:12px; border:1px solid #e2e8f0;">${data.transcript.replace(/\n/g, '<br>')}</div>
            `;
        }

        // Download-Button in der Detailansicht
        document.getElementById('downloadTranscriptBtn').addEventListener('click', () => {
            if (!currentDetailTranscript) {
                alert('Kein Text zum Herunterladen vorhanden.');
                return;
            }
            // Dateiname aus Datum generieren
            const d = currentDetailDate instanceof Date ? currentDetailDate : new Date();
            const filename = `transkription_${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}.txt`;
            const blob = new Blob([currentDetailTranscript], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
        });
    </script>
</body>
</html>
