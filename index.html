<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice2Text</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <!-- Optional: für späteren Storage (nicht benötigt, falls keine Audiodateien) -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #333; line-height: 1.6; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; margin-bottom: 20px; }
        input, button, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { background: #3498db; color: white; border: none; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2980b9; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .error { color: #e74c3c; margin: 10px 0; }
        .success { color: #27ae60; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav button { width: auto; background: #ecf0f1; color: #7f8c8d; }
        .nav button.active { background: #3498db; color: white; }
        .card { background: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 10px; cursor: pointer; }
        .card:hover { background: #eef2f3; }
        .hidden { display: none; }
        #transcriptBox { background: #f0f0f0; padding: 15px; border-radius: 5px; min-height: 150px; margin: 20px 0; white-space: pre-wrap; }
        #interim { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Hier werden die verschiedenen Ansichten per JavaScript eingeblendet -->
        <div id="loginView" class="view">
            <h1>Voice2Text – Anmeldung</h1>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="E-Mail" required>
                <input type="password" id="loginPassword" placeholder="Passwort" required>
                <button type="submit">Anmelden</button>
                <button type="button" id="showRegisterBtn">Registrieren</button>
            </form>
            <div id="loginError" class="error"></div>
        </div>

        <div id="registerView" class="view hidden">
            <h1>Registrierung</h1>
            <form id="registerForm">
                <input type="text" id="registerName" placeholder="Name (optional)">
                <input type="email" id="registerEmail" placeholder="E-Mail" required>
                <input type="password" id="registerPassword" placeholder="Passwort" required>
                <button type="submit">Registrieren</button>
                <button type="button" id="showLoginBtn">Zurück zum Login</button>
            </form>
            <div id="registerError" class="error"></div>
        </div>

        <div id="dashboardView" class="view hidden">
            <div class="nav">
                <button id="newRecordingBtn">➕ Neue Aufnahme</button>
                <button id="logoutBtn">🚪 Abmelden</button>
            </div>
            <h2>Meine Aufnahmen</h2>
            <div id="recordingsList"></div>
        </div>

        <div id="recordView" class="view hidden">
            <div class="nav">
                <button id="backToDashboardBtn">← Zurück</button>
            </div>
            <h2>Live-Transkription</h2>
            <p>Sprache: Deutsch (kann in der Konsole geändert werden)</p>
            <button id="startRecordingBtn">🎤 Start</button>
            <button id="stopRecordingBtn" disabled>⏹️ Stopp</button>
            <div id="transcriptBox">
                <div id="final"></div>
                <div id="interim"></div>
            </div>
            <form id="saveTranscriptForm" class="hidden">
                <h3>Transkription speichern</h3>
                <textarea id="transcriptText" rows="6" readonly></textarea>
                <button type="submit">💾 Speichern</button>
            </form>
        </div>

        <div id="detailView" class="view hidden">
            <div class="nav">
                <button id="backFromDetailBtn">← Zurück</button>
            </div>
            <h2>Aufnahmedetail</h2>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        // --------------------------------------
        // 1. FIREBASE KONFIGURATION (ersetzen!)
        // --------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyBwVWZ-pvmxpblIjejl9gjNLe0yFq4pN5s",
            authDomain: "voice2textzerogen.firebaseapp.com",
            projectId: "voice2textzerogen",
            storageBucket: "voice2textzerogen.firebasestorage.app",
            messagingSenderId: "228011105975",
            appId: "1:228011105975:web:43912cc1c0b24897c1b732"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        // Optional: Firestore offline Persistenz aktivieren
        db.enablePersistence().catch(err => console.warn('Offline nicht verfügbar', err));

        // --------------------------------------
        // 2. GLOBALE VARIABLEN
        // --------------------------------------
        let currentUser = null;
        let recognition = null;
        let finalTranscript = '';
        let currentRecordingId = null; // Für Detailansicht

        // --------------------------------------
        // 3. VIEW- MANAGEMENT (Hash-Routing)
        // --------------------------------------
        const views = {
            login: document.getElementById('loginView'),
            register: document.getElementById('registerView'),
            dashboard: document.getElementById('dashboardView'),
            record: document.getElementById('recordView'),
            detail: document.getElementById('detailView')
        };

        function showView(viewName, param = null) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            if (views[viewName]) {
                views[viewName].classList.remove('hidden');
                if (viewName === 'detail' && param) {
                    loadRecordingDetail(param);
                } else if (viewName === 'dashboard') {
                    loadRecordings();
                }
            }
            // Hash aktualisieren (für direktes Linken)
            if (viewName === 'detail' && param) {
                location.hash = `#detail/${param}`;
            } else if (viewName !== 'detail') {
                location.hash = `#${viewName}`;
            }
        }

        // Routing bei Hash-Änderung
        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', handleRoute);

        function handleRoute() {
            const hash = location.hash.slice(1) || 'login';
            const parts = hash.split('/');
            const view = parts[0];
            if (currentUser) {
                // Wenn eingeloggt, erlaube dashboard, record, detail, sonst redirect zu dashboard
                if (view === 'login' || view === 'register') {
                    showView('dashboard');
                } else if (view === 'detail' && parts[1]) {
                    showView('detail', parts[1]);
                } else if (view === 'record') {
                    showView('record');
                } else {
                    showView('dashboard');
                }
            } else {
                // Nicht eingeloggt: nur login/register erlauben
                if (view === 'register') {
                    showView('register');
                } else {
                    showView('login');
                }
            }
        }

        // --------------------------------------
        // 4. AUTHENTIFIZIERUNG
        // --------------------------------------
        auth.onAuthStateChanged(user => {
            currentUser = user;
            handleRoute(); // View je nach Status aktualisieren
        });

        // Login-Formular
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                // Weiterleitung erfolgt via onAuthStateChanged
            } catch (error) {
                document.getElementById('loginError').innerText = error.message;
            }
        });

        // Zur Registrierung wechseln
        document.getElementById('showRegisterBtn').addEventListener('click', () => {
            showView('register');
        });

        // Registrierungs-Formular
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const name = document.getElementById('registerName').value;
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                if (name) {
                    await userCred.user.updateProfile({ displayName: name });
                }
                // Automatisch eingeloggt
            } catch (error) {
                document.getElementById('registerError').innerText = error.message;
            }
        });

        document.getElementById('showLoginBtn').addEventListener('click', () => {
            showView('login');
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await auth.signOut();
            showView('login');
        });

        // Zurück Buttons
        document.getElementById('backToDashboardBtn').addEventListener('click', () => showView('dashboard'));
        document.getElementById('backFromDetailBtn').addEventListener('click', () => showView('dashboard'));

        // --------------------------------------
        // 5. DASHBOARD: AUFNAHMEN LISTEN
        // --------------------------------------
        async function loadRecordings() {
            if (!currentUser) return;
            const snapshot = await db.collection('recordings')
                .where('userId', '==', currentUser.uid)
                .orderBy('createdAt', 'desc')
                .get();
            const list = document.getElementById('recordingsList');
            list.innerHTML = '';
            if (snapshot.empty) {
                list.innerHTML = '<p>Keine Aufnahmen vorhanden. Erstelle eine neue!</p>';
                return;
            }
            snapshot.forEach(doc => {
                const data = doc.data();
                const date = data.createdAt?.toDate().toLocaleString() || 'Unbekannt';
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<strong>${date}</strong><br>${data.transcript?.substring(0, 80)}...`;
                card.addEventListener('click', () => showView('detail', doc.id));
                list.appendChild(card);
            });
        }

        // Neue Aufnahme Button
        document.getElementById('newRecordingBtn').addEventListener('click', () => {
            showView('record');
            // Zurücksetzen des Transkriptions-UI
            finalTranscript = '';
            document.getElementById('final').innerHTML = '';
            document.getElementById('interim').innerHTML = '';
            document.getElementById('saveTranscriptForm').classList.add('hidden');
            document.getElementById('startRecordingBtn').disabled = false;
            document.getElementById('stopRecordingBtn').disabled = true;
        });

        // --------------------------------------
        // 6. LIVE-TRANSKRIPTION (Web Speech API)
        // --------------------------------------
        if (!('webkitSpeechRecognition' in window)) {
            alert('Ihr Browser unterstützt keine Spracherkennung. Bitte verwenden Sie Chrome oder Edge.');
        } else {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';

            recognition.onstart = () => {
                document.getElementById('startRecordingBtn').disabled = true;
                document.getElementById('stopRecordingBtn').disabled = false;
                document.getElementById('saveTranscriptForm').classList.add('hidden');
            };

            recognition.onerror = (event) => {
                console.error('Spracherkennungsfehler:', event.error);
                alert('Fehler bei der Spracherkennung: ' + event.error);
                document.getElementById('startRecordingBtn').disabled = false;
                document.getElementById('stopRecordingBtn').disabled = true;
            };

            recognition.onend = () => {
                document.getElementById('startRecordingBtn').disabled = false;
                document.getElementById('stopRecordingBtn').disabled = true;
                if (finalTranscript.trim() !== '') {
                    document.getElementById('transcriptText').value = finalTranscript;
                    document.getElementById('saveTranscriptForm').classList.remove('hidden');
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                document.getElementById('final').innerHTML = `<strong>Endgültig:</strong> ${finalTranscript}`;
                document.getElementById('interim').innerHTML = `<strong>Vorläufig:</strong> ${interimTranscript}`;
            };
        }

        document.getElementById('startRecordingBtn').addEventListener('click', () => {
            if (recognition) {
                finalTranscript = '';
                document.getElementById('final').innerHTML = '';
                document.getElementById('interim').innerHTML = '';
                recognition.start();
            }
        });

        document.getElementById('stopRecordingBtn').addEventListener('click', () => {
            if (recognition) {
                recognition.stop();
            }
        });

        // Transkription speichern
        document.getElementById('saveTranscriptForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const transcript = document.getElementById('transcriptText').value;
            try {
                await db.collection('recordings').add({
                    userId: currentUser.uid,
                    transcript: transcript,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'completed'
                });
                alert('Transkription gespeichert!');
                showView('dashboard');
            } catch (err) {
                alert('Fehler beim Speichern: ' + err.message);
            }
        });

        // --------------------------------------
        // 7. DETAILANSICHT EINER AUFNAHME
        // --------------------------------------
        async function loadRecordingDetail(recordingId) {
            if (!currentUser) return;
            const doc = await db.collection('recordings').doc(recordingId).get();
            if (!doc.exists) {
                document.getElementById('detailContent').innerHTML = '<p>Aufnahme nicht gefunden.</p>';
                return;
            }
            const data = doc.data();
            // Sicherstellen, dass die Aufnahme dem aktuellen Benutzer gehört
            if (data.userId !== currentUser.uid) {
                document.getElementById('detailContent').innerHTML = '<p>Zugriff verweigert.</p>';
                return;
            }
            const date = data.createdAt?.toDate().toLocaleString() || 'Unbekannt';
            document.getElementById('detailContent').innerHTML = `
                <p><strong>Datum:</strong> ${date}</p>
                <p><strong>Transkription:</strong></p>
                <div style="background:#f9f9f9; padding:15px; border-radius:5px;">${data.transcript.replace(/\n/g, '<br>')}</div>
            `;
        }

        // --------------------------------------
        // 8. STARTHILFE: Falls Benutzer schon eingeloggt, direkt Dashboard anzeigen
        // --------------------------------------
        // Das erledigt auth.onAuthStateChanged + handleRoute bereits.
    </script>
</body>
</html>
